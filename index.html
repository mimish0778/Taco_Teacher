<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マジカルタコス 🌮</title>
<style>
:root {
  --bg:#0d1b2a; --surface:#162032; --surface2:#1e2e42;
  --accent:#ff6b35; --accent2:#ffd166; --teal:#06d6a0;
  --pink:#ef476f; --text:#f0f4f8; --muted:#8899aa; --radius:16px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; overflow-x:hidden; }
#stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
#app { position:relative; z-index:1; width:min(640px,100vw); padding:24px 16px 48px; display:flex; flex-direction:column; align-items:center; gap:18px; }
#title-block { text-align:center; }
#title-block h1 { font-size:clamp(2rem,8vw,3.2rem); font-weight:900; letter-spacing:.04em; background:linear-gradient(135deg,var(--accent2) 0%,var(--accent) 60%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1.1; }
#title-block p { color:var(--muted); font-size:.82rem; margin-top:4px; letter-spacing:.08em; }
#stage { background:var(--surface); border:1px solid var(--surface2); border-radius:var(--radius); width:100%; padding:24px; display:flex; flex-direction:column; align-items:center; gap:16px; }
#score-bar { display:flex; gap:24px; justify-content:center; align-items:center; }
.score-item { display:flex; flex-direction:column; align-items:center; gap:2px; }
.score-label { font-size:.7rem; color:var(--muted); letter-spacing:.1em; }
.score-num { font-size:1.8rem; font-weight:900; transition:transform .3s; }
.score-num.pop { transform:scale(1.4); }
#score-player .score-num { color:var(--teal); }
#score-tako .score-num { color:var(--accent); }
.score-sep { color:var(--muted); font-size:1.4rem; }
#rally-dots { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
.rally-dot { width:28px; height:28px; border-radius:50%; background:var(--surface2); border:2px solid var(--surface2); display:flex; align-items:center; justify-content:center; font-size:.65rem; color:var(--muted); font-weight:700; transition:background .3s,border-color .3s; }
.rally-dot.player { background:var(--teal); border-color:var(--teal); color:#000; }
.rally-dot.tako { background:var(--accent); border-color:var(--accent); color:#fff; }
.rally-dot.current { border-color:var(--accent2); animation:dotPulse .9s infinite; }
@keyframes dotPulse { 0%,100% { border-color:var(--accent2); } 50% { border-color:var(--surface2); } }
#tako-wrap { position:relative; width:180px; height:220px; display:flex; align-items:flex-end; justify-content:center; }
#tako-img { width:150px; height:150px; object-fit:contain; }
#taco-on-head { position:absolute; top:0; left:50%; transform:translateX(-50%); width:90px; height:68px; object-fit:contain; display:none; }
#bubble { background:var(--surface2); border:1.5px solid var(--accent); border-radius:14px; padding:12px 18px; font-size:1rem; line-height:1.6; width:100%; min-height:54px; position:relative; text-align:center; color:var(--text); }
#bubble::after { content:''; position:absolute; top:-10px; left:50%; transform:translateX(-50%); border:6px solid transparent; border-bottom-color:var(--accent); }
#bubble.thinking { color:var(--muted); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }
#word-area { background:var(--bg); border:1px solid var(--surface2); border-radius:12px; padding:14px 20px; width:100%; text-align:center; }
#chain-label { font-size:.7rem; color:var(--muted); letter-spacing:.12em; margin-bottom:4px; }
#current-word { font-size:1.7rem; font-weight:700; color:var(--accent2); letter-spacing:.06em; }
#hint-text { font-size:.8rem; color:var(--muted); margin-top:4px; }
#history { width:100%; max-height:120px; overflow-y:auto; display:flex; flex-direction:column; gap:5px; padding:2px 0; }
#history::-webkit-scrollbar { width:4px; }
#history::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:2px; }
.hist-item { display:flex; gap:8px; align-items:baseline; font-size:.85rem; }
.hist-who { font-size:.68rem; font-weight:700; letter-spacing:.07em; min-width:60px; text-align:right; padding:2px 6px; border-radius:4px; }
.hist-who.player { background:#06d6a022; color:var(--teal); }
.hist-who.tako { background:#ff6b3522; color:var(--accent); }
.hist-word { color:var(--text); }
#status-msg { font-size:.85rem; color:var(--pink); min-height:20px; text-align:center; }
#input-area { display:flex; gap:10px; width:100%; }
#word-input { flex:1; padding:12px 16px; background:var(--bg); border:1.5px solid var(--surface2); border-radius:10px; color:var(--text); font-size:1rem; outline:none; transition:border-color .2s; }
#word-input:focus { border-color:var(--accent); }
#word-input:disabled { opacity:.5; }
button { padding:12px 20px; border:none; border-radius:10px; font-size:.9rem; font-weight:700; cursor:pointer; transition:transform .15s,filter .15s; letter-spacing:.04em; }
button:active { transform:scale(.95); }
button:disabled { opacity:.45; cursor:not-allowed; }
#send-btn { background:var(--accent); color:#fff; }
#send-btn:not(:disabled):hover { filter:brightness(1.15); }
#result-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(13,27,42,.88); backdrop-filter:blur(6px); align-items:center; justify-content:center; }
#result-overlay.show { display:flex; }
#result-box { background:var(--surface); border:1.5px solid var(--surface2); border-radius:20px; padding:36px 32px; text-align:center; display:flex; flex-direction:column; gap:16px; max-width:360px; width:90%; }
#result-emoji { font-size:4rem; }
#result-title { font-size:1.9rem; font-weight:900; }
#result-title.win { color:var(--teal); }
#result-title.lose { color:var(--pink); }
#result-detail { font-size:.9rem; color:var(--muted); line-height:1.75; white-space:pre-line; }
#retry-btn { background:var(--accent); color:#fff; padding:14px; border-radius:12px; font-size:1rem; }
@keyframes bounce { 0%,100% { transform:translateY(0); } 40% { transform:translateY(-20px); } }
@keyframes winGlow { 0%,100% { filter:drop-shadow(0 0 6px var(--teal)); } 50% { filter:drop-shadow(0 0 20px var(--teal)); } }
@keyframes loseShake { 0%,100% { transform:rotate(0); } 25% { transform:rotate(-7deg); } 75% { transform:rotate(7deg); } }
@keyframes floatIn { from { opacity:0; transform:translateX(-50%) translateY(-24px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes eatAnim { 0% { transform:translateX(-50%) scale(1); } 25% { transform:translateX(-50%) scale(1.3) rotate(-20deg); } 70% { transform:translateX(-50%) scale(.5) translateY(-30px); opacity:.6; } 100% { transform:translateX(-50%) scale(0) translateY(-70px); opacity:0; } }
@keyframes dropAnim { 0% { transform:translateX(-50%) rotate(0); } 20% { transform:translateX(-50%) rotate(30deg) translateY(10px); } 55% { transform:translateX(-50%) rotate(-15deg) translateY(60px); } 100% { transform:translateX(-50%) rotate(25deg) translateY(150px); opacity:0; } }
.tako-bounce { animation:bounce .5s ease-in-out 2; }
.tako-win { animation:winGlow 1.2s ease-in-out 3; }
.tako-lose { animation:loseShake .4s ease-in-out 3; }
@media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation-duration:.01ms !important; transition-duration:.01ms !important; } }
</style>
</head>
<body>
<!-- APIキー入力オーバーレイ -->
<div id="key-overlay" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(13,27,42,.97);align-items:center;justify-content:center;">
  <div style="background:#162032;border:1.5px solid #1e2e42;border-radius:20px;padding:36px 28px;max-width:380px;width:90%;display:flex;flex-direction:column;gap:16px;">
    <div style="font-size:2rem;text-align:center;">🌮🐙</div>
    <div style="font-size:1.2rem;font-weight:900;text-align:center;color:#ffd166;">Gemini APIキーを入力</div>
    <div style="font-size:.82rem;color:#8899aa;line-height:1.7;">
      <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#ff6b35;">Google AI Studio</a> でキーを取得して貼り付けてください。<br>
      キーはこのブラウザにのみ保存され、外部には送信されません。
    </div>
    <input id="key-input" type="password" placeholder="AIzaSy..."
      style="padding:12px 14px;background:#0d1b2a;border:1.5px solid #1e2e42;border-radius:10px;color:#f0f4f8;font-size:1rem;outline:none;"
      onkeydown="if(event.key==='Enter')startWithKey()">
    <div id="key-error" style="color:#ef476f;font-size:.82rem;min-height:18px;"></div>
    <button onclick="startWithKey()" style="background:#ff6b35;color:#fff;padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;">
      ゲームスタート 🐙
    </button>
    <div style="font-size:.72rem;color:#8899aa;text-align:center;">キーはlocalStorageに保存されます（次回から入力不要）</div>
  </div>
</div>

<canvas id="stars"></canvas>
<div id="app">
  <div id="title-block">
    <h1>🌮 マジカルタコス</h1>
    <p>10ラリーでタコちゃんに勝てるかな？</p>
  </div>
  <div id="stage">
    <div id="score-bar">
      <div class="score-item" id="score-player">
        <span class="score-label">あなたの勝ち</span>
        <span class="score-num" id="p-score">0</span>
      </div>
      <span class="score-sep">–</span>
      <div class="score-item" id="score-tako">
        <span class="score-label">タコちゃんの勝ち</span>
        <span class="score-num" id="t-score">0</span>
      </div>
    </div>
    <div id="rally-dots"></div>
    <div id="tako-wrap">
      <img id="taco-on-head" alt="タコス">
      <img id="tako-img" alt="タコちゃん">
    </div>
    <div id="bubble">…</div>
    <div id="word-area">
      <div id="chain-label">タコちゃんが言った言葉</div>
      <div id="current-word">―</div>
      <div id="hint-text"></div>
    </div>
    <div id="history"></div>
    <div id="status-msg"></div>
    <div id="input-area">
      <input type="text" id="word-input" placeholder="連想した言葉を入力してEnter" maxlength="20" disabled
             onkeydown="if(event.key==='Enter')submitWord()">
      <button id="send-btn" onclick="submitWord()" disabled>送る</button>
    </div>
  </div>
</div>
<div id="result-overlay">
  <div id="result-box">
    <div id="result-emoji">🎉</div>
    <div id="result-title" class="win">あなたの勝ち！</div>
    <div id="result-detail"></div>
    <button id="retry-btn" onclick="retryGame()">もう一度あそぶ 🐙</button>
  </div>
</div>
<script>
/* ===== STARFIELD ===== */
(function() {
  var c = document.getElementById('stars');
  var ctx = c.getContext('2d');
  function rz() { c.width = innerWidth; c.height = innerHeight; }
  rz(); addEventListener('resize', rz);
  var st = [];
  for (var i = 0; i < 130; i++) {
    st.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.4 + .3, a: Math.random(), da: (Math.random() - .5) * .004 });
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    for (var i = 0; i < st.length; i++) {
      var s = st[i];
      s.a = Math.max(.1, Math.min(1, s.a + s.da));
      if (s.a <= .1 || s.a >= 1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x * c.width, s.y * c.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + s.a + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

var Voice = {
  speak: function(text, opts) {
    opts = opts || {};
    return new Promise(function(resolve) {
      if (!window.speechSynthesis) { resolve(); return; }
      speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP';
      u.rate = opts.rate || 0.93;
      u.pitch = opts.pitch || 1.3;
      u.onend = resolve;
      u.onerror = resolve;
      var vs = speechSynthesis.getVoices();
      var v = null;
      for (var i = 0; i < vs.length; i++) {
        if (vs[i].lang.indexOf('ja') === 0 && /female|kyoko|haruka/i.test(vs[i].name)) { v = vs[i]; break; }
      }
      if (!v) { for (var i = 0; i < vs.length; i++) { if (vs[i].lang.indexOf('ja') === 0) { v = vs[i]; break; } } }
      if (v) u.voice = v;
      speechSynthesis.speak(u);
    });
  }
};
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); };

function safeParseJSON(raw) {
  var s = raw.replace(/```json/gi, '').replace(/```/g, '').trim();
  var m = s.match(/\{[\s\S]*\}/);
  if (m) s = m[0];
  return JSON.parse(s);
}

  };
  if (systemText) {
    body.system_instruction = { parts: [{ text: systemText }] };
  }
  return fetch(GEMINI_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function(res) {
    if (!res.ok) {
      return res.json().catch(function() { return {}; }).then(function(err) {
        throw new Error('API error ' + res.status + ': ' + (err.error ? err.error.message : ''));
      });
    }
    return res.json();
  }).then(function(d) {
    var text = (d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts && d.candidates[0].content.parts[0]) ? d.candidates[0].content.parts[0].text.trim() : '';
    console.log('[Gemini OK]', text.slice(0, 100));
    return text;
  });
}

/* ===== TAKO REPLY ===== */
var TAKO_SYS = 'あなたは「タコちゃん」というかわいいタコのキャラクターです。\nマジカルバナナ（連想ゲーム）でプレイヤーと対決中です。\nプレイヤーの言葉から連想できる日本語の単語を1つ答えてください。\n・日本語の単語1語のみ\n・使用済みの言葉は使えない\n・必ずgive_upはfalseで答えること\nJSONのみで回答:\n{"word":"答えの単語","comment":"かわいいコメント20字以内","difficulty":5,"give_up":false}';

function getTakoReply(playerWord, usedWords) {
  var userText = 'プレイヤーの言葉:「' + playerWord + '」\n使用済み:' + (usedWords.length ? usedWords.join('、') : 'なし') + '\n「' + playerWord + 'といったら？」';
  return callGemini(userText, TAKO_SYS).then(function(raw) {
    var parsed = safeParseJSON(raw);
    if (typeof parsed.word !== 'string') throw new Error('word missing');
    parsed.difficulty = Number(parsed.difficulty) || 5;
    console.log('[Tako]', playerWord, '->', parsed.word, 'diff:', parsed.difficulty);
    return parsed;
  }).catch(function(e) {
    console.error('[Tako error]', e.message);
    return { word: null, comment: 'うーん…', difficulty: 5, give_up: false };
  });
}

/* ===== 失敗確率 (11ラリー以降のみ) ===== */
function shouldFail(difficulty, rally) {
  if (rally <= RALLY_WIN) return false;
  var d = Math.max(1, Math.min(10, difficulty));
  var p = Math.pow(d / 10, 2.2) * 0.40;
  var roll = Math.random();
  console.log('[shouldFail] rally:', rally, 'diff:', d, 'p:', (p * 100).toFixed(1) + '%', roll < p ? 'FAIL' : 'OK');
  return roll < p;
}

/* ===== STATE ===== */
var wordChain = [], playerScore = 0, takoScore = 0, rallyCount = 0, gameActive = false, playerTurn = false, dots = [];

/* ===== DOM ===== */
function $(id) { return document.getElementById(id); }
function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
function setBubble(txt, thinking) { $('bubble').textContent = txt; $('bubble').className = thinking ? 'thinking' : ''; }
function setStatus(txt) { $('status-msg').textContent = txt; }
function setWord(word) {
  $('current-word').textContent = word || '―';
  $('hint-text').textContent = word ? '「' + word + '」といったら？' : '';
}
function addHistory(who, word) {
  var d = document.createElement('div');
  d.className = 'hist-item';
  d.innerHTML = '<span class="hist-who ' + who + '">' + (who === 'player' ? 'あなた' : 'タコちゃん') + '</span><span class="hist-word">' + word + '</span>';
  $('history').prepend(d);
}
function popScore(id) {
  var el = $(id);
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  setTimeout(function() { el.classList.remove('pop'); }, 400);
}
function enableInput(on) {
  $('word-input').disabled = !on;
  $('send-btn').disabled = !on;
  if (on) setTimeout(function() { $('word-input').focus(); }, 60);
}

/* ===== DOTS ===== */
function initDots() {
  var c = $('rally-dots'); c.innerHTML = ''; dots = [];
  for (var i = 0; i < RALLY_WIN; i++) {
    var d = document.createElement('div'); d.className = 'rally-dot'; d.textContent = i + 1;
    c.appendChild(d); dots.push(d);
  }
}
function updateDots() {
  for (var i = 0; i < dots.length; i++) {
    dots[i].classList.remove('player', 'tako', 'current');
    var r = i + 1;
    if (r < rallyCount) dots[i].classList.add(r % 2 === 1 ? 'tako' : 'player');
    else if (r === rallyCount) dots[i].classList.add('current');
  }
}

/* ===== TAKO ANIM ===== */
function takoAnim(type) {
  var w = $('tako-wrap');
  w.classList.remove('tako-bounce', 'tako-win', 'tako-lose');
  void w.offsetWidth; w.classList.add('tako-' + type);
  setTimeout(function() { w.classList.remove('tako-' + type); }, 2200);
}
function showTaco() {
  var t = $('taco-on-head');
  t.style.cssText = 'display:block;opacity:1;transform:translateX(-50%);';
  t.style.animation = 'floatIn .5s ease forwards';
}
function eatTaco() {
  var t = $('taco-on-head');
  t.style.animation = 'eatAnim .9s ease forwards';
  setTimeout(function() { t.style.display = 'none'; t.style.animation = ''; }, 1000);
}
function dropTaco() {
  var t = $('taco-on-head');
  t.style.animation = 'dropAnim .9s ease forwards';
  setTimeout(function() { t.style.display = 'none'; t.style.animation = ''; }, 1000);
}

/* ===== UTILS ===== */
function normKana(s) {
  var r = '';
  for (var i = 0; i < s.length; i++) {
    var code = s.charCodeAt(i);
    r += (code >= 0x30A1 && code <= 0x30F6) ? String.fromCharCode(code - 0x60) : s[i];
  }
  return r.toLowerCase().trim();
}
function isDupe(word) {
  for (var i = 0; i < wordChain.length; i++) { if (normKana(wordChain[i]) === normKana(word)) return true; }
  return false;
}
function isJP(s) {
  // ひらがな・カタカナ・漢字のみ許可
  return /^[\u3041-\u30ff\u4e00-\u9fff\u3000-\u303f\u30fc]+$/.test(s.trim());
}

/* ===== BOOT ===== */
window.addEventListener('DOMContentLoaded', function() {
  $('tako-img').src     = 'data:image/png;base64,' + TAKO_B64;
  $('taco-on-head').src = 'data:image/png;base64,' + TACOS_B64;
  initDots();

  // localStorageから保存済みキーを読み込む
  var saved = localStorage.getItem('gemini_api_key');
  if (saved && saved.startsWith('AIza')) {
    API_KEY = saved;
    GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/' + MODEL + ':generateContent?key=' + API_KEY;
    startRound();
  } else {
    var overlay = $('key-overlay');
    overlay.style.display = 'flex';
    setTimeout(function() { $('key-input').focus(); }, 100);
  }
});

function startWithKey() {
  var key = $('key-input').value.trim();
  if (!key.startsWith('AIza')) {
    $('key-error').textContent = '正しいAPIキーを入力してください（AIzaSy... の形式）';
    return;
  }
  API_KEY = key;
  GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/' + MODEL + ':generateContent?key=' + API_KEY;
  localStorage.setItem('gemini_api_key', key);
  $('key-overlay').style.display = 'none';
  startRound();
}

/* ===== ROUND ===== */
async function startRound() {
  wordChain = []; rallyCount = 0; gameActive = true; playerTurn = false;
  $('history').innerHTML = ''; setStatus('');
  initDots(); showTaco();
  takoAnim('bounce');
  var open = 'マジカルタコス！タコスと言ったら～！';
  setBubble(open);
  await Voice.speak(open);
  await sleep(300);

  setBubble('最初の言葉を考えてるよ〜', true);
  var first = await getFirstWord();
  wordChain.push(first); rallyCount = 1; updateDots();
  addHistory('tako', first); setWord(first);
  var intro = '「' + first + '」！さあ、連想してみて！';
  setBubble(intro); takoAnim('bounce');
  await Voice.speak(intro);
  enableInput(true); playerTurn = true;
}

function getFirstWord() {
  return callGemini(
    'マジカルバナナの最初のお題として、日本人に親しみやすい日本語の単語を1つだけ答えてください。例:タコス、夏、電車、猫。JSONのみ:{"word":"単語"}',
    ''
  ).then(function(raw) {
    var p = safeParseJSON(raw);
    return (p.word || 'タコス').replace(/[「」。、！？\s\n]/g, '');
  }).catch(function() { return 'タコス'; });
}

/* ===== SUBMIT ===== */
async function submitWord() {
  if (!gameActive || !playerTurn) return;
  var input = $('word-input');
  var word = input.value.trim(); input.value = '';
  if (!word) { setStatus('言葉を入力してください'); return; }
  if (!isJP(word)) { setStatus('日本語の言葉を入力してください！'); return; }
  if (isDupe(word)) { setStatus('「' + word + '」はもう使いました！'); return; }
  setStatus(''); enableInput(false); playerTurn = false;

  wordChain.push(word); rallyCount++; updateDots();
  addHistory('player', word); setWord(word);

  if (rallyCount >= RALLY_WIN) {
    await endGame(true, '「' + word + '」で10ラリー達成！タコちゃんに勝ったよ🎉', 'あなたの勝ち！');
    return;
  }

  await sleep(400);
  setBubble('うーん…考えてる〜', true); takoAnim('bounce');

  var reply = await getTakoReply(word, wordChain);
  console.log('[reply received]', JSON.stringify(reply));

  var wordOK = reply.word && reply.word.length > 0 && !isDupe(reply.word);

  if (shouldFail(reply.difficulty, rallyCount + 1)) {
    await endGame(true, '「' + word + '」から思いつかなかった…あなたの勝ち！😢', 'あなたの勝ち！');
    return;
  }

  if (!wordOK) {
    setBubble('あれれ、混乱しちゃった！もう一度考えてみて！');
    await Voice.speak('あれれ、混乱しちゃった！もう一度考えてみて！');
    playerTurn = true; enableInput(true); return;
  }

  wordChain.push(reply.word); rallyCount++; updateDots();
  addHistory('tako', reply.word); setWord(reply.word);

  if (rallyCount >= RALLY_WIN) {
    await endGame(false, 'タコちゃんが「' + reply.word + '」で10ラリー達成！🌮', 'タコちゃんの勝ち！');
    return;
  }

  var msg = reply.comment + '　→「' + reply.word + '」！';
  setBubble(msg); takoAnim('bounce');
  await Voice.speak(msg);
  playerTurn = true; enableInput(true);
}

/* ===== END ===== */
async function endGame(playerWin, msg, title) {
  gameActive = false;
  if (playerWin) { playerScore++; $('p-score').textContent = playerScore; popScore('p-score'); takoAnim('lose'); dropTaco(); }
  else           { takoScore++;  $('t-score').textContent = takoScore;  popScore('t-score'); takoAnim('win');  eatTaco(); }
  setBubble(msg);
  await Voice.speak(msg);
  var rc = rallyCount, ps = playerScore, ts = takoScore;
  setTimeout(function() {
    $('result-emoji').textContent = playerWin ? '🎉' : '🌮';
    var t = $('result-title'); t.textContent = title; t.className = playerWin ? 'win' : 'lose';
    $('result-detail').textContent = msg + '\n\nラリー数: ' + rc + '\nスコア　あなた ' + ps + ' – タコちゃん ' + ts;
    $('result-overlay').classList.add('show');
  }, 1400);
}

function retryGame() {
  $('result-overlay').classList.remove('show');
  startRound();
}
</script>
